spring.application.name=candidates

api.prefix=/api

#spring.datasource.type=org.apache.tomcat.jdbc.pool.DataSource

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.platform=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/duhrcandidatemanagementdb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=root
#spring.datasource.password=password

spring.jpa.defer-datasource-initialization=true

#spring.jpa.hibernate.ddl-auto = create-drop
spring.jpa.hibernate.ddl-auto = create
#spring.jpa.hibernate.ddl-auto = none

#deprecated
#spring.datasource.initialization-mode=always
spring.sql.init.mode=always

spring.sql.init.data-locations=classpath:import.sql
spring.sql.init.encoding=UTF-8

# Generate & Save creation script as .sql
#spring.jpa.properties.javax.persistence.schema-generation.create-source=metadata
#spring.jpa.properties.javax.persistence.schema-generation.scripts.action=create
#spring.jpa.properties.javax.persistence.schema-generation.scripts.create-target=schema.sql

spring.jpa.show-sql = true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

#https://vladmihalcea.com/the-open-session-in-view-anti-pattern/
spring.jpa.open-in-view=false

#spring.main.allow-circular-references=true

logging.level.org.hibernate.SQL=debug

